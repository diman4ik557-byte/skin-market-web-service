<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Заказы - Skin Market</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #667eea; color: white; }
        .status-NEW { color: #007bff; font-weight: bold; }
        .status-IN_PROGRESS { color: #ffc107; font-weight: bold; }
        .status-REVIEW { color: #17a2b8; font-weight: bold; }
        .status-COMPLETED { color: #28a745; font-weight: bold; }
        .status-CANCELLED { color: #dc3545; font-weight: bold; }
        .nav a { margin-right: 15px; text-decoration: none; color: #667eea; }
        .btn {
            padding: 5px 10px;
            margin: 2px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-start { background: #28a745; color: white; }
        .btn-review { background: #ffc107; color: black; }
        .btn-complete { background: #007bff; color: white; }
        .btn-cancel { background: #dc3545; color: white; }
        .btn-chat { background: #17a2b8; color: white; text-decoration: none; display: inline-block; }
        a.btn-chat { padding: 5px 10px; border-radius: 3px; }

        /* Пагинация */
        .pagination { display: flex; justify-content: center; margin-top: 30px; gap: 5px; flex-wrap: wrap; }
        .pagination a, .pagination span { padding: 8px 12px; text-decoration: none; border: 1px solid #ddd; border-radius: 4px; color: #667eea; }
        .pagination a:hover { background: #667eea; color: white; }
        .pagination .active { background: #667eea; color: white; border-color: #667eea; }
        .pagination .disabled { color: #ccc; cursor: not-allowed; }

        .info-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-size-select { padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="/">Главная</a>
        <a href="/marketplace">Доска художников</a>
        <a href="/users/profile">Мой профиль</a>
        <a href="/orders">Мои заказы</a>
        <a href="/orders/create">Создать заказ</a>
        <a href="/artist/orders">Мои заказы (художник)</a>
        <a href="/studios">Студии</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" style="background:none; border:none;
             color:#667eea; cursor:pointer;">Выйти</button>
        </form>
    </div>

    <h1>Мои заказы</h1>

    <div class="info-bar">
        <div>Всего заказов: <strong th:text="${totalItems}"></strong></div>
        <div>
            Показывать по:
            <select class="page-size-select" onchange="changePageSize(this.value)">
                <option value="5" th:selected="${pageSize == 5}">5</option>
                <option value="10" th:selected="${pageSize == 10}">10</option>
                <option value="20" th:selected="${pageSize == 20}">20</option>
                <option value="50" th:selected="${pageSize == 50}">50</option>
            </select>
        </div>
    </div>

    <div th:if="${orders == null or orders.empty}">
        <p>У вас пока нет заказов. <a href="/orders/create">Создайте первый заказ!</a></p>
    </div>

    <div th:unless="${orders == null or orders.empty}">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Описание</th>
                <th>Цена</th>
                <th>Статус</th>
                <th>Художник</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td><a th:href="@{/orders/{id}(id=${order.id})}" th:text="${order.id}"></a></td>
                <td th:text="${order.description}"></td>
                <td th:text="${order.price}"></td>
                <td><span th:class="'status-' + ${order.status.name()}" th:text="${order.status}"></span></td>
                <td th:text="${order.artistName}"></td>
                <td>
                    <a th:href="@{/chat/order/{id}(id=${order.id})}" class="btn-chat"> Чат</a>

                    <div th:if="${order.status.name() == 'NEW'}">
                        <form th:action="@{/orders/{id}/start(id=${order.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-start">Начать</button>
                        </form>
                        <form th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-cancel">Отменить</button>
                        </form>
                    </div>

                    <div th:if="${order.status.name() == 'IN_PROGRESS'}">
                        <form th:action="@{/orders/{id}/submit-review(id=${order.id})}" method="post" style="display:inline;">
                            <input type="hidden" name="finalFileUrl" th:value="'/uploads/order_' + ${order.id} + '_final.png'">
                            <button type="submit" class="btn btn-review">На проверку</button>
                        </form>
                        <form th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-cancel">Отменить</button>
                        </form>
                    </div>

                    <div th:if="${order.status.name() == 'REVIEW'}">
                        <form th:action="@{/orders/{id}/complete(id=${order.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-complete"> Завершить</button>
                        </form>
                        <form th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-cancel"> Отменить</button>
                        </form>
                    </div>

                    <div th:if="${order.status.name() == 'COMPLETED' or order.status.name() == 'CANCELLED'}">
                        <span style="color: #6c757d;">Заказ обработан</span>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- Пагинация -->
        <div class="pagination">
            <a th:if="${currentPage > 0}"
               th:href="@{/orders(page=${currentPage - 1}, size=${pageSize}, sort=${sortField}, direction=${sortDirection})}">
                « Предыдущая
            </a>
            <span th:if="${currentPage == 0}" class="disabled">« Предыдущая</span>

            <a th:each="pageNum : ${pageNumbers}"
               th:href="@{/orders(page=${pageNum}, size=${pageSize}, sort=${sortField}, direction=${sortDirection})}"
               th:text="${pageNum + 1}"
               th:class="${pageNum == currentPage} ? 'active' : ''"></a>

            <a th:if="${currentPage + 1 < totalPages}"
               th:href="@{/orders(page=${currentPage + 1}, size=${pageSize}, sort=${sortField}, direction=${sortDirection})}">
                Следующая »
            </a>
            <span th:if="${currentPage + 1 >= totalPages}" class="disabled">Следующая »</span>
        </div>
    </div>
</div>

<script>
    function changePageSize(size) {
    window.location.href = '/marketplace?page=0&size=' + size + '&sort=' + '[[${sortField}]]' + '&direction=' + '[[${sortDirection}]]';
}

function changeSort(sort) {
    window.location.href = '/marketplace?page=0&size=' + '[[${pageSize}]]' + '&sort=' + sort + '&direction=' + '[[${sortDirection}]]';
}

function changeDirection() {
    var newDirection = '[[${sortDirection}]]' === 'ASC' ? 'DESC' : 'ASC';
    window.location.href = '/marketplace?page=0&size=' + '[[${pageSize}]]' + '&sort=' + '[[${sortField}]]' + '&direction=' + newDirection;
}
</script>
</body>
</html>
