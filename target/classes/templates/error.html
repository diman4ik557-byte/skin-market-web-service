<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ошибка - Skin Market</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 100px auto; background: white; padding: 30px; border-radius: 8px; text-align: center; }
        h1 { color: #dc3545; }
        .error { color: #666; margin: 20px 0; }
        .btn { display: inline-block; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚠️ Ошибка</h1>
    <div class="error" th:text="${error != null ? error : 'Произошла непредвиденная ошибка'}"></div>
    <a href="/" class="btn">Вернуться на главную</a>
</div>
</body>
</html>
