<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мой профиль - Skin Market</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        .nav a { margin-right: 15px; text-decoration: none; color: #667eea; }
        .info { margin: 15px 0; padding: 10px; border-bottom: 1px solid #eee; }
        .label { font-weight: bold; width: 120px; display: inline-block; }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }
        .btn-artist { background: #28a745; }
        .message { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="/">Главная</a>
        <a href="/marketplace">Доска художников</a>
        <a href="/users/profile">Мой профиль</a>
        <a href="/orders">Заказы</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" style="background:none; border:none; color:#667eea; cursor:pointer;">Выйти</button>
        </form>
    </div>

    <h1>Мой профиль</h1>

    <div th:if="${message}" class="message success" th:text="${message}"></div>
    <div th:if="${error}" class="message error" th:text="${error}"></div>

    <div class="info">
        <span class="label">Имя:</span> <span th:text="${user.username}"></span>
    </div>
    <div class="info">
        <span class="label">Email:</span> <span th:text="${user.email}"></span>
    </div>
    <div class="info">
        <span class="label">Роль:</span> <span th:text="${user.role}"></span>
    </div>
    <div class="info">
        <span class="label">Баланс:</span> <span th:text="${user.balance}"></span>
    </div>

    <div th:if="${user.role.name() == 'USER'}">
        <form th:action="@{/users/profile/become-artist}" method="post" onsubmit="return confirm('Вы уверены, что хотите стать художником? Это действие нельзя отменить!')">
            <button type="submit" class="btn btn-artist">Стать художником</button>
        </form>
        <p style="font-size: 12px; color: #666; margin-top: 10px;">
            Став художником, вы сможете создавать скины на заказ и зарабатывать!
        </p>
    </div>

    <div th:if="${user.role.name() == 'ARTIST'}">
        <a href="/studios/create" class="btn"> Создать студию</a>
        <a href="/artist/orders" class="btn"> Мои заказы (художник)</a>
        <a href="/marketplace" class="btn"> Доска художников</a>
    </div>

</div>
</body>
</html>
