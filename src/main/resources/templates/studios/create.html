<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создать студию - Skin Market</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        .nav a { margin-right: 15px; text-decoration: none; color: #667eea; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; }
        h1 { margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="/">Главная</a>
        <a href="/studios">Студии</a>
        <a href="/users/profile">Профиль</a>
    </div>

    <h1>Создание студии</h1>

    <form th:action="@{/studios/create}" method="post">
        <label>Название студии</label>
        <input type="text" name="name" required>

        <label>Описание</label>
        <textarea name="description" rows="5" required></textarea>

        <button type="submit">Создать студию</button>
    </form>
</div>
</body>
</html>
