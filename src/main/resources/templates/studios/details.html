<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Студия - Skin Market</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .nav a { margin-right: 15px; text-decoration: none; color: #667eea; }
        h1 { margin-bottom: 20px; }
        .error { color: red; text-align: center; padding: 40px; }
        .btn { padding: 8px 15px; background: #667eea; color: white; text-decoration: none; border-radius: 4px; border: none; cursor: pointer; display: inline-block; }
        .btn-danger { background: #dc3545; }
        .btn-success { background: #28a745; }
        .member-card { border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .chat-section { margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee; }
        .messages { max-height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 4px; margin: 10px 0; background: #f9f9f9; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 8px; }
        .message.sent { background: #667eea; color: white; text-align: right; }
        .message.received { background: #e9ecef; color: #333; }
        .chat-input { display: flex; gap: 10px; margin-top: 10px; }
        .chat-input input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .message-info { font-size: 11px; margin-top: 5px; opacity: 0.7; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="/">Главная</a>
        <a href="/studios">Студии</a>
        <a href="/users/profile">Профиль</a>
        <a href="/orders">Заказы</a>
    </div>

    <div th:if="${studio == null}">
        <div class="error">
            <h2>Студия не найдена</h2>
            <a href="/studios" class="btn">← Вернуться к списку студий</a>
        </div>
    </div>

    <div th:unless="${studio == null}">
        <h1 th:text="${studio.name}"></h1>
        <p th:text="${studio.description}"></p>
        <p><strong>Основана:</strong> <span th:text="${studio.foundedAt}"></span></p>
        <p><strong>Руководитель:</strong> <span th:text="${studio.managerName}"></span></p>

        <h2>Участники (<span th:text="${members.size()}"></span>)</h2>
        <div th:each="member : ${members}" class="member-card">
            <span th:text="${member.username}"></span>
            <span th:if="${member.id == studio.managerId}" style="background:#28a745; color:white; padding:2px 8px; border-radius:10px;">Менеджер</span>
        </div>

        <!-- Чат со студией -->
        <div class="chat-section">
            <h3>💬 Чат студии</h3>
            <div class="messages" id="messages">
                <div style="text-align:center; color:#999;">Загрузка сообщений...</div>
            </div>
            <div class="chat-input">
                <input type="text" id="messageInput" placeholder="Напишите сообщение...">
                <button onclick="sendToStudio()" class="btn">📤 Отправить</button>
            </div>
        </div>

        <div th:if="${isManager or isAdmin}" style="margin-top: 20px;">
            <form th:action="@{/studios/{id}/delete(id=${studio.id})}" method="post"
                  onsubmit="return confirm('Удалить студию?')">
                <button type="submit" class="btn btn-danger"> Удалить студию</button>
            </form>
        </div>

        <div style="margin-top: 20px;">
            <a href="/studios" class="btn">← Назад к студиям</a>
        </div>
    </div>
</div>

</body>
</html>
