<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создать заказ - Skin Market</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        .nav a { margin-right: 15px; text-decoration: none; color: #667eea; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 12px 30px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .validation-error { color: #dc3545; font-size: 12px; margin-top: 5px; display: block; }
        .input-error { border-color: #dc3545 !important; }
        .error-message { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 4px; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="/">Главная</a>
        <a href="/marketplace">Доска художников</a>
        <a href="/users/profile">Профиль</a>
        <a href="/orders">Заказы</a>
    </div>

    <h1>📝 Создать заказ на скин</h1>

    <div th:if="${error}" class="error-message" th:text="${error}"></div>

    <form id="orderForm" th:action="@{/orders/create}" method="post" onsubmit="return validateForm()">
        <div class="form-group">
            <label>Выберите художника *</label>
            <select id="artistId" name="artistId" required>
                <option value="">-- Выберите художника --</option>
                <option th:each="artist : ${artists}" th:value="${artist.id}" th:text="${artist.username}"></option>
            </select>
            <span id="artistError" class="validation-error"></span>
        </div>

        <div class="form-group">
            <label>Описание заказа *</label>
            <textarea id="description" name="description" rows="5" required
                      placeholder="Опишите, какой скин вы хотите. Укажите стиль, цвета, референсы..."></textarea>
            <span id="descriptionError" class="validation-error"></span>
            <small id="charCount" style="color: #666; font-size: 12px;">0 / 5000 символов</small>
        </div>

        <div class="form-group">
            <label>Предлагаемая цена *</label>
            <input type="number" id="price" name="price" step="0.01" min="1" max="100000" required placeholder="Например: 1000">
            <span id="priceError" class="validation-error"></span>
        </div>

        <button type="submit">🚀 Отправить заказ</button>
    </form>
</div>

<script>
    // Подсчет символов в описании
    const description = document.getElementById('description');
    const charCount = document.getElementById('charCount');

    description.addEventListener('input', function() {
        const length = this.value.length;
        charCount.textContent = length + ' / 5000 символов';
        if (length < 10 && length > 0) {
            document.getElementById('descriptionError').textContent = 'Минимум 10 символов';
        } else if (length > 5000) {
            document.getElementById('descriptionError').textContent = 'Максимум 5000 символов';
        } else {
            document.getElementById('descriptionError').textContent = '';
        }
    });

    function validateForm() {
        let isValid = true;

        // Валидация художника
        const artistId = document.getElementById('artistId').value;
        if (!artistId) {
            document.getElementById('artistError').textContent = 'Выберите художника';
            document.getElementById('artistId').classList.add('input-error');
            isValid = false;
        } else {
            document.getElementById('artistError').textContent = '';
            document.getElementById('artistId').classList.remove('input-error');
        }

        // Валидация описания
        const description = document.getElementById('description').value;
        if (!description) {
            document.getElementById('descriptionError').textContent = 'Описание обязательно';
            document.getElementById('description').classList.add('input-error');
            isValid = false;
        } else if (description.length < 10) {
            document.getElementById('descriptionError').textContent = 'Минимум 10 символов';
            document.getElementById('description').classList.add('input-error');
            isValid = false;
        } else if (description.length > 5000) {
            document.getElementById('descriptionError').textContent = 'Максимум 5000 символов';
            document.getElementById('description').classList.add('input-error');
            isValid = false;
        } else {
            document.getElementById('descriptionError').textContent = '';
            document.getElementById('description').classList.remove('input-error');
        }

        // Валидация цены
        const price = document.getElementById('price').value;
        if (!price) {
            document.getElementById('priceError').textContent = 'Цена обязательна';
            document.getElementById('price').classList.add('input-error');
            isValid = false;
        } else if (price < 1) {
            document.getElementById('priceError').textContent = 'Цена должна быть не менее 1';
            document.getElementById('price').classList.add('input-error');
            isValid = false;
        } else if (price > 100000) {
            document.getElementById('priceError').textContent = 'Цена не может превышать 100000';
            document.getElementById('price').classList.add('input-error');
            isValid = false;
        } else {
            document.getElementById('priceError').textContent = '';
            document.getElementById('price').classList.remove('input-error');
        }

        return isValid;
    }

    // Очистка ошибок при вводе
    document.getElementById('artistId').addEventListener('change', function() {
        document.getElementById('artistError').textContent = '';
        this.classList.remove('input-error');
    });
    document.getElementById('price').addEventListener('input', function() {
        document.getElementById('priceError').textContent = '';
        this.classList.remove('input-error');
    });
</script>
</body>
</html>
