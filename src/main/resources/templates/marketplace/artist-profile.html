<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Профиль художника - Skin Market</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        .nav a { margin-right: 15px; text-decoration: none; color: #667eea; }
        .profile-header { text-align: center; margin-bottom: 30px; }
        .profile-name { font-size: 28px; color: #333; }
        .profile-role { color: #667eea; font-size: 18px; }
        .info-section { margin: 20px 0; padding: 20px; background: #f8f9fa; border-radius: 10px; }
        .btn-order {
            display: inline-block;
            padding: 12px 30px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
        }
        .orders-list { margin-top: 30px; }
        .order-item { border-bottom: 1px solid #eee; padding: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="/">Главная</a>
        <a href="/marketplace">Доска художников</a>
        <a href="/users/profile">Мой профиль</a>
    </div>

    <div class="profile-header">
        <div class="profile-name" th:text="${artist.username}"></div>
        <div class="profile-role" th:text="'🎨 ' + ${artist.role}"></div>
    </div>

    <div class="info-section">
        <h3>📊 Информация</h3>
        <p><strong>Email:</strong> <span th:text="${artist.email}"></span></p>
        <p><strong>💰 Баланс:</strong> <span th:text="${artist.balance}"></span></p>
        <p><strong>📅 Дата регистрации:</strong> <span th:text="${#temporals.format(artist.registeredAt, 'dd.MM.yyyy HH:mm')}"></span></p>
    </div>

    <div style="text-align: center; margin: 20px 0;">
        <a th:href="@{/orders/create?artistId={id}(id=${artist.id})}" class="btn-order">📝 Заказать скин у этого художника</a>
    </div>

    <div class="orders-list">
        <h3>📋 Последние заказы художника</h3>
        <div th:if="${orders.empty}">
            <p>У этого художника пока нет заказов</p>
        </div>
        <div th:each="order : ${orders}" class="order-item">
            <p><strong>Заказ #<span th:text="${order.id}"></span></strong></p>
            <p>Статус: <span th:text="${order.status}"></span></p>
            <p>Цена: <span th:text="${order.price}"></span></p>
        </div>
    </div>
</div>
</body>
</html>
